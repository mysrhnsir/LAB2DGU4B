        /* CSS Tambahan untuk susun atur seperti gambar */
        html, body {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background-color: #1a1d20;
        }
        
        /* Header Hijau */
        #header-top {
            height: 50px;
            background-color: #2d5a27;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-style: italic;
            font-size: 22px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
            position: relative;
        }

        /* Container untuk Peta + Sidebar */
        #main-wrapper {
            display: flex;
            height: calc(100% - 50px);
            width: 100%;
        }

        /* Peta (Kiri) */
        #map {
            flex: 1;
            height: 100%;
            background: #f0f0f0;
        }

        /* Sidebar (Kanan) */
        #sidebar {
            width: 320px;
            background-color: #212529;
            color: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            border-left: 1px solid #333;
        }

        .section-title { font-size: 16px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; color: #ccc; }
        .app-name { font-size: 14px; margin-bottom: 20px; font-weight: bold; color: #fff; }
        
        .input-group { margin-bottom: 10px; }
        .input-box {
            width: 100%;
            padding: 10px;
            background: #121416;
            border: 1px solid #3a3f44;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
        }

        /* Butang Sidebar */
        .btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: none;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-cari { background-color: #28a745; }
        .btn-reset { background-color: #dc3545; }
        .btn-export { background-color: #17a2b8; margin-top: 5px; }

        /* Kotak Info (Data Lot) */
        .info-card {
            background: #2c3034;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            border-left: 5px solid #28a745;
        }
        .info-label { font-size: 10px; color: #9da5ad; text-transform: uppercase; margin-bottom: 4px; }
        .info-value { font-size: 15px; font-weight: bold; color: #28a745; }

        hr { border: 0.5px solid #3a3f44; width: 100%; margin: 15px 0; }
        </style>

        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }

        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);

        }

            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.on('popupopen', function(e) {
                addClassToPopupIfMedia(content, e.popup);
            });
            layer.bindPopup(content, { maxHeight: 400 });

        bounds_group.addLayer(layer_TANDASEMPADANNEW_3);

            labels.push(layer);
