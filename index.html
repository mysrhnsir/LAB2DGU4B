<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        
        <title>Smart Community Map</title>

        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-search.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        
        <style>
            /* Susun Atur Utama */
            html, body {
                width: 100%;
                height: 100%;
                padding: 0;
                margin: 0;
                font-family: 'Arial', sans-serif;
                overflow: hidden;
                background-color: #1a1d20;
            }
            
            #main-container {
                display: flex;
                flex-direction: column;
                height: 100vh;
            }

            /* Header Hijau (Sebiji Macam Gambar) */
            #header-top {
                height: 60px;
                background-color: #2d5a27; /* Hijau Gelap */
                display: flex;
                align-items: center;
                justify-content: center;
                color: white;
                box-shadow: 0 2px 5px rgba(0,0,0,0.3);
                z-index: 1000;
                position: relative;
                gap: 15px;
            }

            .logo-box {
                height: 40px;
                background: white;
                padding: 3px;
                border-radius: 4px;
            }

            /* Tajuk Smart Community Map */
            .header-text {
                letter-spacing: 1px;
                font-size: 22px;
                font-style: italic;
            }

            /* Container Peta & Sidebar */
            #content-wrapper {
                display: flex;
                flex: 1;
                width: 100%;
            }

            #map {
                flex: 1;
                height: 100%;
                background: #f0f0f0;
            }

            /* Sidebar (Panel Kanan) */
            #sidebar {
                width: 320px;
                background-color: #212529; /* Warna Gelap */
                color: #ffffff;
                padding: 20px;
                display: flex;
                flex-direction: column;
                overflow-y: auto;
                border-left: 1px solid #333;
            }

            .section-title { font-size: 14px; margin-bottom: 15px; color: #ccc; display: flex; align-items: center; gap: 8px; }
            .app-name { font-size: 15px; margin-bottom: 20px; font-weight: bold; color: #fff; }
            
            .input-group { margin-bottom: 10px; }
            .input-box {
                width: 100%;
                padding: 10px;
                background: #121416;
                border: 1px solid #3a3f44;
                color: white;
                border-radius: 4px;
                box-sizing: border-box;
            }

            /* Butang Sidebar */
            .btn {
                width: 100%;
                padding: 12px;
                margin-bottom: 8px;
                border: none;
                border-radius: 4px;
                color: white;
                font-weight: bold;
                cursor: pointer;
            }
            .btn-cari { background-color: #28a745; }
            .btn-reset { background-color: #dc3545; }
            .btn-export { background-color: #17a2b8; }

            /* Kotak Info Data Lot */
            .info-card {
                background: #2c3034;
                padding: 12px;
                border-radius: 6px;
                margin-bottom: 12px;
                border-left: 5px solid #28a745;
            }
            .info-label { font-size: 10px; color: #9da5ad; text-transform: uppercase; margin-bottom: 4px; }
            .info-value { font-size: 15px; font-weight: bold; color: #28a745; }

            hr { border: 0.5px solid #3a3f44; width: 100%; margin: 15px 0; }
        </style>
    </head>
    <body>
        
        <div id="main-container">
            <div id="header-top">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/be/Politeknik_Malaysia.png" class="logo-box" alt="Logo Politeknik">
                <div class="header-text">
                    <span style="font-weight: normal; color: white;">smart</span>
                    <span style="font-weight: normal; color: white;">resident</span>
                </div>
            </div>

            <div id="content-wrapper">
                <div id="map"></div>

                <div id="sidebar">
                    <div class="section-title"><i class="fas fa-cog"></i> Tetapan Paparan</div>
                    <div class="app-name">🌍 Land Explorer</div>
                    
                    <div class="input-group">
                        <label style="font-size: 10px; color: #888;">CARIAN NO LOT</label>
                        <input type="text" id="sidebar-search" class="input-box" placeholder="11462">
                    </div>
                    
                    <button class="btn btn-cari">Cari Lot</button>
                    <button class="btn btn-reset">Reset Peta</button>
                    <button class="btn btn-export">📄 Export Detail + Map (PDF)</button>
                    
                    <hr>

                    <div class="info-card">
                        <div class="info-label">Total Lot</div>
                        <div class="info-value">67</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">No Lot Dipilih</div>
                        <div class="info-value" id="val-no-lot">11462</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">Nama Pemilik</div>
                        <div class="info-value" id="val-pemilik" style="color: #fff;">ALI BIN ABU</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">Luas Lot</div>
                        <div class="info-value" id="val-luas">106.825 m²</div>
                    </div>
                </div>
            </div>
        </div>

        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="js/leaflet-search.js"></script>
        
        <script src="data/LOT_1.js"></script>
        <script src="data/LOTFINAL_2.js"></script>
        <script src="data/TANDASEMPADANNEW_3.js"></script>
        
        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[2.102896,102.521351],[2.104225,102.523462]]);
        
        var layer_GoogleSatellite = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
            opacity: 1.0, attribution: ''
        }).addTo(map);

        // Kod di bawah adalah untuk memaparkan data GeoJSON anda
        function style_LOT_1_0() {
            return { color: 'rgba(35,35,35,1.0)', weight: 1.0, fill: true, fillColor: 'rgba(229,182,54,1.0)' };
        }
        
        var layer_LOT_1 = new L.geoJson(json_LOT_1, {
            style: style_LOT_1_0,
            onEachFeature: function(feature, layer) {
                layer.bindPopup('No Lot: ' + feature.properties['NO_LOT']);
            }
        }).addTo(map);

        // Tambah kawalan zoom di atas kiri
        L.control.zoom({ position: 'topleft' }).addTo(map);
        </script>
    </body>
</html>
